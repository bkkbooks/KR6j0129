body:
  text: 大興善寺三藏沙門大廣智不空奉詔譯真言行者若求安怛陀那應作是念我云何能速取成就當習是三摩地所謂一切法無色猶如虛空性自成就作如是勝解當如本教淨持地等作是三摩地普遍三千界充滿智成水有大寶蓮華開敷在水中寶莖如須彌上方珠網覆蓮上有大寶八柱以莊嚴想成寶樓閣四門當四方珠網蓮鐸等及妙拂莊嚴半滿月珠瓔垂寶間錯帶是大寶樓閣遍滿於有頂應隨力思惟觀供養雲海先所觀樓中有悅意白繖以衆寶端嚴寶瓔半滿月妙拂等莊嚴繖上有大寶普遍發光相皆散雨衆寶真言智觀行於彼樓閣中金剛師子座寶蓮華莊嚴珠網蓮繒磬白拂等莊嚴一切欲喜樂於中圍繞住不遠於身前應想第二座一切皆如上唯無師子座角門於四處嬉戲焚香等次作圓具法云何作圓具先應觀諸法無性為自性物我同一體然後加諸法云何加諸法生老病死憂攪擾於心田如是思惟已應生大悲愍由是生智心則是光明心光明心者即是菩提心也以大悲熏成其體如皓月離能取所取菩提心已生應住身口意所明體加持此名圓具法即如瑜伽中成身次第也族明勝次第知族五部明已五部真言也衆真言威德知已自住部王法謂一字頂輪王法也則為當族主先應印已成謂大印也次明應思惟由身口意體觀身為諸佛於心想月輪真言者應知有種種光明皆從月形生遍至無量界復入行人心堅固為五峰變為金剛形想在彼掌中復出種種光其光皆遍滿至於無邊界而作佛遊戲還來瑜岐身如是皆入已成普賢大色應觀大菩薩諸相皆成就一切莊嚴具蓮華鬘灌頂自成摩訶薩從瑜岐心生持真言弓箭依住於月輪或持鬘而住或四方安居隨力觀身前諸衆生大樂最上令成就一切印嚴手惠施於一切諸有情如願并熙怡為舞金剛鬘流出為左於腰側住右作舞勢安立衆生利如自明隨形諸衆生所思皆令成調伏作如是加持利益於衆生及餘諸利益攞寫等供養而以陳奉獻自身自所尊真言字相應隨力而念誦如聲色相應以字為華鬘智者應思惟依瑜伽相應於聲我今說一字最勝成如來蓮華部商佉聲念誦我讚如雷聲分明稱吽字我說金剛部亦通大自在念誦者成就南摩尼羯磨此部作念誦如擊鈴鐸聲如箜篌笛聲如舞動瓔聲其如孔雀鳴如諸部法中相應一切義成如是音聲而作於念誦與真言相應真言者隨聲應思惟其義不久當成就此通一切部是聲念誦儀軌儀竟我說色念誦我今說一切色者說為印與此相應轉謂運為也善思惟其明當安於胸臆印焰明觀察身中出金剛甘露而灌灑令本天喜悅得隱自身形大勤勇我說由此真言者知以印令我不久易餘身我今說瑜伽念誦如昔說其明應思惟安置於自處供養以如教純相應念誦離心喉頂舌鼻及與齶處及離念內外唯法相應爾不應依於聲此名為金剛瑜伽念誦儀若知真實體應當知成就而獲得常恆以此瑜伽法相應而住之以菩提勝心為成就不久皆悉得如意其中字念誦如獲我今說如是積資糧真言應誦持以文字為色應分別觀之作念誦事業月行列意生明字與之俱安本尊胸臆不久得道成於月以月合於一切字色應於上思惟光明輪莊嚴行列不間斷如以線穿珠金色以為光晃曜本尊身如彼彼月字殊勝妙真言以成真言者則彼彼喜悅力命增熾盛意光明相應我說為文字行列之念誦我今通諸儀則成就物光澤我今說誦明念誦者若作彼以光明成就於諸物應生念誦相應儀一切真言皆得成一儀與相應應作識清淨清淨為心識智者然當入成就以身以語以意依如是物而住應知四支法於瑜伽法成就此中說為意獲通及地等以身現諸身决云謂隨衆生意所樂者以語辨一切烟焰等成就我說物成就於身中身成就者種類有多種四印及餘輪壇瑜伽者應當盡可解者而作大曼荼羅曼荼羅儀軌成辨中央三昧形應安軟座西方或以赤麞皮中安氈華而坐而安坐一切瑜伽三摩地相應晝夜等至謂入定也真言者住與慧念相應中夜或明相現時決定當成就或地及神通成就如來說我今說意成就現身而獲之以印加持身我今為大印應作思惟於成就及曼荼羅念誦者淨心則成就我說成就相口身或出光明暖焰及增等若見升空去成就相應知於身成就我廣說已我說語成就法如獲次第說應為先行法已如前法應作謂自建立已來乃至大印等口心印上住蓮華應知於心間於上住商佉謂在蓮華上也商佉中出聲相續無間斷於蓮華中發生金剛舌以白色謂作赤色上有金剛舌上或想佛或寶或蓮華或羯磨金剛或餘部印契或一月及兩月三四及五月乃至八箇月觀想於此壇結跏趺坐常以本寂靜相應分明觀商佉聲已即依蓮華界從華蘂出聲量如微塵其聲出至咽次又至於舌便即成其字舌字出光焰熾猛而普遍以聲滿虛空行者住定誦或一日及一夜中夜或後夜從舌出光明其光有大聲或從心從脣及齒出間錯光明若見如是者當知得悉地以此語相應成就能摧諸異宗令他發淨信能為衆生利益如是瑜伽相應念誦有比丘嚩迦者吒得口成就於間錯山中七日而成語成就儀則我今說物成就如前瑜伽應成就應取餘部物等或用餘部印及真言三簸哆謂以杓應娑嚩二合訶聲注物便瀉爐中及餘聲未盡還注物行相作已智者於此曼荼羅即入羯磨三昧耶自為一切羯磨自在其中為色相一切於本部主應與於右手印物為次第於金剛縛中安物物類於中積縛印當䐡下或當心二手以縛物獻安自心自明智者以此法觀身火光聚以先所集身口意善資糧用以此身物安於明手中真言字火焰聲念誦真言者盡其夜應作不應破其坐以此儀則法初夜當生暖煙當於中夜光焰於明相如是漸次加如光焰成物得飛騰虛空於三界自在我說安繕那法我曾已先說應斷一切取應依於本明乃至自身體語心亦如是以自真言應隱沒作本明主應作念誦大金剛名者以金剛大身智者應堅住召入縛令喜當安於心如自心所樂我明觀自身我是虛空由此相應成就故乃至一切欲界主彼等不見形剎那至梵天以畫彼法作鈎召應作四印曼荼羅應安意在左手自身安於彼以拳應堅持作拳為虛空如是安怛陀那雖忉利天宮亦不能見遊於他化自在天宮恣意安樂自在乃至意所樂丸藥口安怛陀那法我今略說成就法如是觀自明我是一切體所謂以虛空內所有為一切體自身同彼印住微細金剛三昧入於自明心於丸藥成就觀丸藥置於口能遊須彌頂一切世間不能見藥色成大力謂體隨意變身受忉利天宮欲樂隨意得快樂餘世間相雜我今說安怛陀那丸藥依本教成真言智應作自明智身前求成就者應獻無垢如虛空明身物及色以明字行列光焰相應住當入本尊身如隱沒住意從明口流出真言光威猛丸藥善應成烟氣騰生已禁止已安口為不現形中自在遊戲於四洲殺那諸世界還來歸本處所去得隨意種種成就藥叉衆常以為眷屬亦能遊戲須彌四天王下層四藥叉世界作無量有情利益失正道漂曠野王賊水火等逼起悲愍心於一切繫縛處我當成就已皆令得解脫我今已略說廣法如大經應觀自心月月形具光明則此月中一字如金色難覩如日輪光明普舒遍瑜岐想光明則其字為輪其輪為轉輪持妙色形七寶圍繞遍身毛孔中流出無量佛瑜岐應思惟用金剛界印四處誦真言加持勤勇力成就念定勤為薪焚燒一切罪以真言色火當離疑分別求大乘樂棄小乘樂殷勤慧菩提住真言儀則貞享三年丙寅中商初朔訓點凡此一軸文甚叵解必多亂脫今強訓解後賢力之況復最極祕密勿容易之河南教興苾芻淨嚴四十八載
